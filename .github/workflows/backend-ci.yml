name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  ACR_REGISTRY: acrproductcatalog.azurecr.io
  IMAGE_NAME: product-catalog-api
  CONTAINER_APP_NAME: ca-product-catalog-api
  RESOURCE_GROUP: rg-product-catalog

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend/ProductCatalog.sln

      - name: Build
        run: dotnet build backend/ProductCatalog.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/tests/ProductCatalog.Unit.Tests/ProductCatalog.Unit.Tests.csproj --no-restore --verbosity normal

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: acrproductcatalog.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            acrproductcatalog.azurecr.io/product-catalog-api:latest
            acrproductcatalog.azurecr.io/product-catalog-api:${{ github.sha }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
